<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio - Gutierrez Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white">

<!-- NAV (IGUAL QUE INDEX) -->
<header class="fixed w-full bg-black/70 backdrop-blur-md z-50">
  <div class="max-w-6xl mx-auto flex justify-between items-center p-5">
    <a href="index.html" class="font-semibold">Gutierrez Studio</a>

    <div class="flex gap-6 text-sm">
      <a href="portfolio.html" class="text-gray-300">Portafolio</a>
      <a href="https://wa.me/50661161626"
         class="bg-white text-black px-4 py-2 rounded-full">
         Contactar
      </a>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="pt-32 pb-20 text-center px-6">

  <h1 class="text-4xl md:text-6xl font-bold">
    Nuestro trabajo
  </h1>

  <p class="text-gray-400 mt-4">
    Restaurantes, eventos, marcas y contenido comercial
  </p>

</section>

<!-- FILTROS -->
<div class="flex justify-center gap-4 mb-10 px-4 flex-wrap">

  <button onclick="filter('all')" class="border px-4 py-2 rounded-full hover:bg-white hover:text-black transition">
    Todo
  </button>

  <button onclick="filter('food')" class="border px-4 py-2 rounded-full hover:bg-white hover:text-black transition">
    Restaurantes
  </button>

  <button onclick="filter('event')" class="border px-4 py-2 rounded-full hover:bg-white hover:text-black transition">
    Eventos
  </button>

  <button onclick="filter('auto')" class="border px-4 py-2 rounded-full hover:bg-white hover:text-black transition">
    Autos
  </button>

</div>

<!-- GRID -->
<section class="max-w-6xl mx-auto px-6 pb-20">

  <div class="grid md:grid-cols-3 gap-6" id="grid">

    <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800"
         class="rounded-xl hover:scale-105 transition food">

    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800"
         class="rounded-xl hover:scale-105 transition event">

    <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=800"
         class="rounded-xl hover:scale-105 transition auto">

    <img src="https://images.unsplash.com/photo-1543353071-873f17a7a088?w=800"
         class="rounded-xl hover:scale-105 transition food">

    <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800"
         class="rounded-xl hover:scale-105 transition event">

    <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=800"
         class="rounded-xl hover:scale-105 transition auto">

  </div>

</section>

<!-- CTA FINAL (IGUAL ESTILO) -->
<section class="py-20 text-center">

  <h2 class="text-3xl font-bold">
    ¿Quieres resultados como estos?
  </h2>

  <a href="https://wa.me/50661161626"
     class="mt-8 inline-block bg-white text-black px-10 py-4 rounded-full">
     Contactar
  </a>

</section>

<!-- FOOTER -->
<footer class="text-center text-gray-500 py-10 text-sm">
  Gutierrez Studio © 2026
</footer>

<script>
function filter(category){
  let items = document.querySelectorAll('#grid img');

  items.forEach(el => {
    if(category === 'all'){
      el.style.display = 'block';
    } else {
      el.style.display = el.classList.contains(category) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
