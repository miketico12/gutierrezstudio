<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolio - Gutierrez Studio</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>

<body class="bg-black text-white">

<!-- NAV -->
<header class="p-5 flex justify-between max-w-6xl mx-auto">
  <a href="index.html">← Volver</a>
  <a href="https://wa.me/50661161626">Contactar</a>
</header>

<!-- TITLE -->
<section class="text-center py-20">

  <h1 class="text-4xl md:text-6xl font-bold">
    Nuestro trabajo
  </h1>

  <p class="text-gray-400 mt-4">
    Restaurantes, eventos, marcas y contenido comercial
  </p>

</section>

<!-- FILTROS -->
<div class="flex justify-center gap-4 mb-10">
  <button onclick="filter('all')" class="px-4 py-2 border rounded-full">Todo</button>
  <button onclick="filter('food')" class="px-4 py-2 border rounded-full">Restaurantes</button>
  <button onclick="filter('event')" class="px-4 py-2 border rounded-full">Eventos</button>
  <button onclick="filter('auto')" class="px-4 py-2 border rounded-full">Autos</button>
</div>

<!-- GRID -->
<div class="grid md:grid-cols-3 gap-6 max-w-6xl mx-auto px-6" id="grid">

  <img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=800" class="rounded-xl food">
  <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=800" class="rounded-xl event">
  <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?w=800" class="rounded-xl auto">

  <img src="https://images.unsplash.com/photo-1543353071-873f17a7a088?w=800" class="rounded-xl food">
  <img src="https://images.unsplash.com/photo-1492684223066-81342ee5ff30?w=800" class="rounded-xl event">
  <img src="https://images.unsplash.com/photo-1511919884226-fd3cad34687c?w=800" class="rounded-xl auto">

</div>

<script>
function filter(category){
  let items = document.querySelectorAll('#grid img');

  items.forEach(el => {
    if(category === 'all'){
      el.style.display = 'block';
    } else {
      el.style.display = el.classList.contains(category) ? 'block' : 'none';
    }
  });
}
</script>

</body>
</html>
